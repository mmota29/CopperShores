<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copper Shores</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 id="campaign-title">Copper Shores</h1>
      <p class="subtitle">Campaign Dashboard</p>
    </header>

    <main class="main">
      <!-- HOME VIEW -->
      <section id="home-view" class="view">
        <!-- Party + DM -->
        <section class="card">
          <h2>Party Members</h2>
          <ul id="party-list" class="list"></ul>
        </section>

        <section class="card">
          <h2>Dungeon Master</h2>
          <p id="dm-name"></p>
        </section>

        <!-- Navigation buttons -->
        <section class="card">
          <h2>Navigation</h2>
          <p class="muted">
            These buttons don’t go anywhere yet – only “Roster” switches views for now.
          </p>
          <div id="nav-buttons" class="nav-grid"></div>
        </section>
      </section>

      <!-- ROSTER VIEW -->
      <section id="roster-view" class="view hidden">
        <section class="card">
          <h2>Roster</h2>
          <p class="muted">Full Copper Shores party roster.</p>
          <ul id="roster-list" class="list"></ul>
        </section>
      </section>
    </main>
  </div>

  <!-- Backend logic -->
  <script src="js/state.js"></script>

  <!-- Frontend render logic -->
  <script src="js/home.js"></script>
</body>
</html>
