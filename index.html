<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copper Shores</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 id="campaign-title">Copper Shores</h1>
      <p class="subtitle">Campaign Dashboard</p>
    </header>

    <main class="main">
      <!-- Party + DM -->
      <section class="card">
        <h2>Party Members</h2>
        <ul id="party-list" class="list"></ul>
      </section>

      <section class="card">
        <h2>Dungeon Master</h2>
        <p id="dm-name"></p>
      </section>

      <!-- Navigation buttons (decorative for now) -->
      <section class="card">
        <h2>Navigation</h2>
        <p class="muted">These buttons don’t go anywhere yet – they’re just the main sections this site will have.</p>
        <div id="nav-buttons" class="nav-grid"></div>
      </section>
    </main>
  </div>

  <!-- Backend logic -->
  <script src="app.js"></script>

  <!-- Frontend render logic -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const backend = window.copperShoresBackend;
      if (!backend) {
        console.error("Copper Shores backend not found.");
        return;
      }

      // Title
      const titleEl = document.getElementById("campaign-title");
      titleEl.textContent = backend.getCampaignName();

      // DM
      const dm = backend.getDungeonMaster();
      const dmEl = document.getElementById("dm-name");
      dmEl.textContent = dm.name || "Unknown";

      // Party
      const party = backend.getPartyMembers();
      const partyList = document.getElementById("party-list");
      partyList.innerHTML = "";
      party.forEach(member => {
        const li = document.createElement("li");
        li.className = "list-item";
        li.innerHTML = `
          <span class="char-name">${member.character}</span>
          <span class="player-name">– ${member.player}</span>
        `;
        partyList.appendChild(li);
      });

      // Navigation buttons
      const nav = backend.getNavigationButtons();
      const navContainer = document.getElementById("nav-buttons");
      navContainer.innerHTML = "";
      nav.forEach(btn => {
        const b = document.createElement("button");
        b.className = "nav-btn";
        b.type = "button";
        b.textContent = btn.label;
        // Later: hook up real navigation here using btn.route
        navContainer.appendChild(b);
      });
    });
  </script>
</body>
</html>
